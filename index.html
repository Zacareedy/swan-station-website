<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHARMA - Swan Station Terminal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Timer Display (Top Right) -->
        <div class="timer-container">
            <div class="timer-display" id="timerDisplay">108:00</div>
            <div class="timer-status" id="timerStatus">OPERATIONAL</div>
        </div>

        <!-- Main Terminal -->
        <div class="terminal">
            <!-- Header -->
            <div class="terminal-header">
                <div class="header-left">
                    <span class="dharma-logo">DHARMA</span>
                    <span class="station-name">SWAN STATION</span>
                </div>
                <div class="header-right">
                    <span class="system-status">SYSTEM OPERATIONAL</span>
                </div>
            </div>

            <!-- Hieroglyph Display (Hidden until timer reaches 0) -->
            <div class="hieroglyph-display" id="hieroglyphDisplay" style="display: none;">
                <div class="hieroglyph-grid">
                    <span class="hieroglyph">☩</span>
                    <span class="hieroglyph">⟡</span>
                    <span class="hieroglyph">♗</span>
                    <span class="hieroglyph">⬟</span>
                </div>
                <div class="warning-text">SYSTEM FAILURE IMMINENT</div>
            </div>

            <!-- Terminal Content -->
            <div class="terminal-content" id="terminalContent">
                <div class="welcome-message">
                    <p>DHARMA INITIATIVE - SWAN STATION INTRANET</p>
                    <p>Project: DHARMA</p>
                    <p>Station: Swan</p>
                    <p>System Status: OPERATIONAL</p>
                    <p>Last Maintenance: 1977-03-15</p>
                    <p>---</p>
                    <p>Type 'help' for available commands.</p>
                </div>
                <div id="commandHistory"></div>
            </div>

            <!-- Input Line -->
            <div class="input-line">
                <span class="prompt">\>: </span>
                <input 
                    type="text" 
                    id="commandInput" 
                    class="command-input" 
                    autocomplete="off"
                    spellcheck="false"
                >
            </div>
        </div>
    </div>

    <!-- Hieroglyph Overlay (shown when timer expires and numbers entered) -->
    <div class="hieroglyph-overlay" id="hieroglyphOverlay" style="display: none;">
        <div class="overlay-content">
            <div class="large-hieroglyphs">
                <span>☩</span><span>⟡</span><span>♗</span><span>⬟</span>
            </div>
            <div class="overlay-status">SYSTEM LOCKDOWN</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
